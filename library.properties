sentence=Renesas RFP CLI bootloader programmer for the Arduino UNO R4 WiFi (RA4M1).
paragraph=Programs the Renesas RA bootloader over UART using the RFP/SCI boot protocol. Reads a single-block Intel HEX image from a mounted filesystem (LittleFS/FatFS) and streams it to the target. Framework-neutral: the UART, logging and file path are injected, so it builds under both the Arduino (ESP32) and ESP-IDF frameworks.
